<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConvoLens — Curation Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --surface2: #1e1e23;
    --border: #2a2a32;
    --accent-medical: #4ade80;
    --accent-ethical: #fb923c;
    --accent-cultural: #60a5fa;
    --text: #e8e8ed;
    --text-muted: #6b6b7a;
    --text-dim: #9999aa;
    --yes-color: #4ade80;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,17,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .logo span { color: var(--accent-cultural); }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex: 1;
  }

  .filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .filter-btn.active-all   { background: var(--surface2); color: var(--text); border-color: #444; }
  .filter-btn.active-medical  { background: #0d2918; color: var(--accent-medical); border-color: var(--accent-medical); }
  .filter-btn.active-ethical  { background: #2a1500; color: var(--accent-ethical); border-color: var(--accent-ethical); }
  .filter-btn.active-cultural { background: #0c1f35; color: var(--accent-cultural); border-color: var(--accent-cultural); }
  .filter-btn.active-selected { background: #1a2e1a; color: var(--yes-color); border-color: var(--yes-color); }

  .counter {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    margin-left: auto;
  }
  .counter strong { color: var(--yes-color); }

  /* ── UPLOAD ZONE ── */
  #upload-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 60px 24px;
    text-align: center;
  }

  .upload-box {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 48px 64px;
    cursor: pointer;
    transition: all 0.3s;
    max-width: 480px;
    width: 100%;
  }
  .upload-box:hover { border-color: var(--accent-cultural); background: rgba(96,165,250,0.04); }

  .upload-icon { font-size: 48px; margin-bottom: 16px; }
  .upload-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    margin-bottom: 8px;
  }
  .upload-sub { color: var(--text-muted); font-size: 14px; line-height: 1.6; }
  .upload-hint {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    margin-top: 16px;
    background: var(--surface2);
    padding: 8px 16px;
    border-radius: 8px;
    display: inline-block;
  }

  #file-input { display: none; }

  /* ── MAIN LAYOUT ── */
  #app { display: none; flex: 1; }

  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: calc(100vh - 57px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--surface);
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .sidebar-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .sidebar-item:hover { background: var(--surface2); }
  .sidebar-item.active { background: var(--surface2); }
  .sidebar-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0 2px 2px 0;
  }
  .sidebar-item.active.medical::before  { background: var(--accent-medical); }
  .sidebar-item.active.ethical::before  { background: var(--accent-ethical); }
  .sidebar-item.active.cultural::before { background: var(--accent-cultural); }

  .item-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }

  .topic-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .medical  .topic-dot { background: var(--accent-medical); }
  .ethical  .topic-dot { background: var(--accent-ethical); }
  .cultural .topic-dot { background: var(--accent-cultural); }

  .item-id {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .selected-badge {
    margin-left: auto;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 10px;
    background: rgba(74,222,128,0.15);
    color: var(--yes-color);
    display: none;
  }
  .is-selected .selected-badge { display: inline; }

  .item-preview {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .item-sub {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 4px;
  }

  /* ── DETAIL PANEL ── */
  .detail {
    overflow-y: auto;
    padding: 32px 40px;
    background: var(--bg);
  }
  .detail::-webkit-scrollbar { width: 4px; }
  .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .detail-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 15px;
  }

  .detail-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .meta-tag {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .meta-tag.topic-medical  { border-color: var(--accent-medical);  color: var(--accent-medical);  background: rgba(74,222,128,0.06); }
  .meta-tag.topic-ethical  { border-color: var(--accent-ethical);  color: var(--accent-ethical);  background: rgba(251,146,60,0.06); }
  .meta-tag.topic-cultural { border-color: var(--accent-cultural); color: var(--accent-cultural); background: rgba(96,165,250,0.06); }

  .select-btn {
    margin-left: auto;
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .select-btn:hover { border-color: var(--yes-color); color: var(--yes-color); }
  .select-btn.selected {
    background: rgba(74,222,128,0.12);
    border-color: var(--yes-color);
    color: var(--yes-color);
  }

  .conversation {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 32px;
  }

  .bubble {
    display: flex;
    gap: 14px;
    max-width: 820px;
  }

  .bubble-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }
  .bubble.user .bubble-avatar   { background: var(--surface2); border: 1px solid var(--border); }
  .bubble.ai    .bubble-avatar  { background: #1a2e3a; border: 1px solid #2a4a5a; color: var(--accent-cultural); }

  .bubble-body { flex: 1; }

  .bubble-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .bubble.ai .bubble-label { color: var(--accent-cultural); }

  .bubble-text {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble.user .bubble-text {
    border-color: var(--border);
  }
  .bubble.ai .bubble-text {
    border-color: #2a3a4a;
    background: #0e1a24;
  }

  /* ── NAVIGATION ── */
  .nav-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  .nav-btn {
    padding: 9px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover:not(:disabled) { border-color: #555; color: var(--text); background: var(--surface2); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .nav-pos {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    flex: 1;
    text-align: center;
  }

  /* ── EXPORT BUTTON ── */
  .export-btn {
    padding: 9px 20px;
    border-radius: 8px;
    border: 1px solid var(--yes-color);
    background: rgba(74,222,128,0.08);
    color: var(--yes-color);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .export-btn:hover { background: rgba(74,222,128,0.16); }

  /* ── PROGRESS BARS ── */
  .progress-section {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .progress-item { flex: 1; min-width: 80px; }
  .progress-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-family: 'DM Mono', monospace;
  }
  .progress-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }
  .progress-fill.medical  { background: var(--accent-medical); }
  .progress-fill.ethical  { background: var(--accent-ethical); }
  .progress-fill.cultural { background: var(--accent-cultural); }
  .progress-count { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">Convo<span>Lens</span> <span style="font-size:13px;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-weight:300;">Curation Reader</span></div>
  <div class="filters" id="filters" style="display:none">
    <button class="filter-btn active-all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" onclick="setFilter('medical')">🏥 Medical</button>
    <button class="filter-btn" onclick="setFilter('ethical')">⚖️ Ethical</button>
    <button class="filter-btn" onclick="setFilter('cultural')">🌍 Cultural</button>
    <button class="filter-btn" onclick="setFilter('selected')">✅ Selected</button>
  </div>
  <div class="counter" id="counter" style="display:none">
    Selected: <strong id="sel-count">0</strong> / 60
  </div>
</header>

<!-- Upload Screen -->
<div id="upload-zone">
  <div class="upload-box" onclick="document.getElementById('file-input').click()"
       ondragover="event.preventDefault()" ondrop="handleDrop(event)">
    <div class="upload-icon">📂</div>
    <div class="upload-title">Load Your Curation Pool</div>
    <div class="upload-sub">Drop your CSV file here or click to browse.<br>Your selections stay private — nothing leaves your browser.</div>
    <div class="upload-hint">data/raw/curation_pool_v4.csv</div>
  </div>
  <input type="file" id="file-input" accept=".csv" onchange="loadFile(this.files[0])">
</div>

<!-- Main App -->
<div id="app">
  <div id="progress-bars" class="progress-section">
    <div class="progress-item">
      <div class="progress-label">medical</div>
      <div class="progress-bar"><div class="progress-fill medical" id="prog-medical" style="width:0%"></div></div>
      <div class="progress-count" id="cnt-medical">0 / 20</div>
    </div>
    <div class="progress-item">
      <div class="progress-label">ethical</div>
      <div class="progress-bar"><div class="progress-fill ethical" id="prog-ethical" style="width:0%"></div></div>
      <div class="progress-count" id="cnt-ethical">0 / 20</div>
    </div>
    <div class="progress-item">
      <div class="progress-label">cultural</div>
      <div class="progress-bar"><div class="progress-fill cultural" id="prog-cultural" style="width:0%"></div></div>
      <div class="progress-count" id="cnt-cultural">0 / 20</div>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="detail" id="detail">
      <div class="detail-empty">← Select a conversation to read</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
let allData = [];
let filtered = [];
let currentIdx = 0;
let selections = {};  // id -> true/false
let activeFilter = 'all';

// ── CSV Loading ──
function handleDrop(e) {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
}

function loadFile(file) {
  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    complete: (results) => {
      allData = results.data;
      // Restore any existing YES selections from the CSV
      allData.forEach(row => {
        if (row.selected && row.selected.toString().toUpperCase().trim() === 'YES') {
          selections[row.id] = true;
        }
      });
      initApp();
    }
  });
}

function initApp() {
  document.getElementById('upload-zone').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  document.getElementById('filters').style.display = 'flex';
  document.getElementById('counter').style.display = 'block';
  applyFilter('all');
  updateProgress();
}

// ── Filtering ──
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn';
  });
  const btns = document.querySelectorAll('.filter-btn');
  const map = { all: 0, medical: 1, ethical: 2, cultural: 3, selected: 4 };
  btns[map[f]].classList.add('active-' + f);
  applyFilter(f);
}

function applyFilter(f) {
  if (f === 'all') filtered = [...allData];
  else if (f === 'selected') filtered = allData.filter(r => selections[r.id]);
  else filtered = allData.filter(r => r.topic_category === f);
  currentIdx = 0;
  renderSidebar();
  if (filtered.length > 0) renderDetail(0);
  else document.getElementById('detail').innerHTML = '<div class="detail-empty">No conversations match this filter</div>';
}

// ── Sidebar ──
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = filtered.map((row, i) => {
    const topic = row.topic_category || 'medical';
    const isSel = selections[row.id] ? 'is-selected' : '';
    const preview = (row.user_message || '').slice(0, 90);
    return `
      <div class="sidebar-item ${topic} ${isSel} ${i === currentIdx ? 'active' : ''}"
           onclick="renderDetail(${i})" id="si-${i}">
        <div class="item-header">
          <div class="topic-dot"></div>
          <span class="item-id">${row.id || i}</span>
          <span class="selected-badge">✓ YES</span>
        </div>
        <div class="item-sub">${row.sub_category || ''}</div>
        <div class="item-preview">${preview}…</div>
      </div>`;
  }).join('');
}

// ── Detail Panel ──
function renderDetail(idx) {
  // Update sidebar active state
  document.querySelectorAll('.sidebar-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  // Scroll sidebar item into view
  const el = document.getElementById(`si-${idx}`);
  if (el) el.scrollIntoView({ block: 'nearest' });

  currentIdx = idx;
  const row = filtered[idx];
  const topic = row.topic_category || '';
  const isSel = selections[row.id];

  const meta = [
    `<span class="meta-tag topic-${topic}">${topic}</span>`,
    row.sub_category ? `<span class="meta-tag">${row.sub_category}</span>` : '',
    row.source_dataset ? `<span class="meta-tag">${row.source_dataset}</span>` : '',
    row.region ? `<span class="meta-tag">🌍 ${row.region}</span>` : '',
    `<span class="meta-tag">${row.id}</span>`,
  ].filter(Boolean).join('');

  const userText = (row.user_message || '').trim();
  const aiText   = (row.ai_response  || '').trim();

  const aiBlock = aiText
    ? `<div class="bubble ai">
        <div class="bubble-avatar">🤖</div>
        <div class="bubble-body">
          <div class="bubble-label">AI Response</div>
          <div class="bubble-text">${escHtml(aiText)}</div>
        </div>
      </div>`
    : `<div style="padding:16px;color:var(--text-muted);font-size:13px;font-style:italic">
        No AI response yet — will be generated in Week 3.
      </div>`;

  document.getElementById('detail').innerHTML = `
    <div class="detail-meta">
      ${meta}
      <button class="select-btn ${isSel ? 'selected' : ''}"
              onclick="toggleSelect('${row.id}', ${idx})">
        ${isSel ? '✓ Selected' : '+ Select'}
      </button>
    </div>
    <div class="conversation">
      <div class="bubble user">
        <div class="bubble-avatar">👤</div>
        <div class="bubble-body">
          <div class="bubble-label">User</div>
          <div class="bubble-text">${escHtml(userText)}</div>
        </div>
      </div>
      ${aiBlock}
    </div>
    <div class="nav-footer">
      <button class="nav-btn" onclick="renderDetail(${idx - 1})" ${idx === 0 ? 'disabled' : ''}>← Prev</button>
      <div class="nav-pos">${idx + 1} of ${filtered.length}</div>
      <button class="nav-btn" onclick="renderDetail(${idx + 1})" ${idx === filtered.length - 1 ? 'disabled' : ''}>Next →</button>
      <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
    </div>`;
}

// ── Select / Deselect ──
function toggleSelect(id, idx) {
  selections[id] = !selections[id];
  // Update sidebar item
  const si = document.getElementById(`si-${idx}`);
  if (si) si.classList.toggle('is-selected', selections[id]);
  // Re-render detail to flip button
  renderDetail(idx);
  updateProgress();
}

function updateProgress() {
  const topics = ['medical', 'ethical', 'cultural'];
  let total = 0;
  topics.forEach(t => {
    const sel = allData.filter(r => r.topic_category === t && selections[r.id]).length;
    const pct = Math.min((sel / 20) * 100, 100);
    document.getElementById(`prog-${t}`).style.width = pct + '%';
    document.getElementById(`cnt-${t}`).textContent = `${sel} / 20`;
    total += sel;
  });
  document.getElementById('sel-count').textContent = total;
}

// ── Export CSV ──
function exportCSV() {
  const rows = allData.map(row => ({
    ...row,
    selected: selections[row.id] ? 'YES' : ''
  }));

  const csv = Papa.unparse(rows);
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'curation_pool_v4_selected.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ── Keyboard navigation ──
document.addEventListener('keydown', e => {
  if (!filtered.length) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (currentIdx < filtered.length - 1) renderDetail(currentIdx + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (currentIdx > 0) renderDetail(currentIdx - 1);
  } else if (e.key === 's' || e.key === 'S') {
    const row = filtered[currentIdx];
    if (row) toggleSelect(row.id, currentIdx);
  }
});

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
